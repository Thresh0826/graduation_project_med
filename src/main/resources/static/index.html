<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>医学影像科研平台 - 可视化预览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .viewer-container { background: #000; border-radius: 8px; position: relative; overflow: hidden; }
        canvas { display: block; margin: 0 auto; cursor: crosshair; }
        .info-overlay { position: absolute; top: 10px; left: 10px; color: #0f0; font-family: monospace; pointer-events: none; }
    </style>
</head>
<body class="bg-gray-900 min-h-screen text-gray-100 flex">

<div class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col h-screen">
    <div class="p-6">
        <h1 class="text-xl font-bold text-blue-500 flex items-center">
            <span class="mr-2">🔬</span>医学影像平台
        </h1>
    </div>
    <nav class="flex-1 px-4 space-y-2">
        <button onclick="switchModule('management')" id="nav-management"
                class="w-full text-left py-3 px-4 rounded-lg transition bg-blue-600 text-white font-medium">
            影像数据管理
        </button>
        <button onclick="switchModule('analysis')" id="nav-analysis"
                class="w-full text-left py-3 px-4 rounded-lg transition hover:bg-gray-700 text-gray-400">
            影像解析模块
        </button>
    </nav>
    <div class="p-4 border-t border-gray-700 text-xs text-gray-500">
        刘杰 @ 2026 毕业设计
    </div>
</div>

<div class="flex-1 h-screen overflow-y-auto p-8 bg-gray-900">

    <div id="module-management" class="space-y-6">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-bold">影像列表管理</h2>
            <button onclick="document.getElementById('fileInput').click()"
                    class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg transition flex items-center">
                <span>+ 上传新影像</span>
            </button>
        </div>
        <input type="file" id="fileInput" class="hidden">

        <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden shadow-xl">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-700 text-gray-300 text-sm uppercase">
                <tr>
                    <th class="px-6 py-4">文件名</th>
                    <th class="px-6 py-4">格式/分辨率</th>
                    <th class="px-6 py-4">上传时间</th>
                    <th class="px-6 py-4 text-right">操作</th>
                </tr>
                </thead>
                <tbody id="managementTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <div id="module-analysis" class="hidden space-y-6">
        <h2 class="text-2xl font-bold mb-4">影像交互解析</h2>
        <div id="analysis-placeholder" class="text-center py-20 border-2 border-dashed border-gray-700 rounded-xl">
            请先在“影像管理”中选择一个影像，或点击右侧列表
        </div>
    </div>

</div>

<script>
    function switchModule(moduleName) {
        // 1. 隐藏所有模块
        document.getElementById('module-management').classList.add('hidden');
        document.getElementById('module-analysis').classList.add('hidden');
        // 2. 显示目标模块
        document.getElementById('module-' + moduleName).classList.remove('hidden');
        // 3. 样式切换逻辑...
    }

    // 渲染管理表格的逻辑
    async function loadManagementList() {
        const res = await fetch(`/api/image/list`);
        const data = await res.json();
        const html = data.map(img => `
                <tr class="border-t border-gray-700 hover:bg-gray-750 transition">
                    <td class="px-6 py-4 font-medium">${img.fileName}</td>
                    <td class="px-6 py-4 text-gray-400 text-sm">${img.format} | ${img.dimX}x${img.dimY}x${img.dimZ}</td>
                    <td class="px-6 py-4 text-gray-400 text-sm">${img.createTime}</td>
                    <td class="px-6 py-4 text-right space-x-2">
                        <button onclick="gotoAnalysis('${img.fileName}', ${img.dimZ})" class="text-blue-400 hover:underline">分析</button>
                        <button onclick="deleteImage(${img.id})" class="text-red-400 hover:underline">删除</button>
                    </td>
                </tr>
             `).join('');
        document.getElementById('managementTableBody').innerHTML = html;
    }

    function gotoAnalysis(name, maxZ) {
        switchModule('analysis');
        openImage(name, maxZ); // 调用你原有的 openImage 函数
    }
    // 1. 定义 API 的地址（必须和后端对应）
    const API = "/api/image";

    // 2. 绑定上传事件（这是最容易丢的一段代码）
    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return; // 如果没选文件，直接返回

        const formData = new FormData();
        formData.append('file', file);

        console.log("开始上传文件:", file.name); // 这行会在 F12 控制台显示

        try {
            const res = await fetch(`${API}/upload`, {
                method: 'POST',
                body: formData
            });

            if (res.ok) {
                alert("上传成功！"); // 弹窗提醒，让你直观看到反应
                loadManagementList(); // 刷新那个管理表格，让新出的数据露面
            } else {
                const errorMsg = await res.text();
                alert("上传失败: " + errorMsg);
            }
        } catch (err) {
            console.error("网络请求出错:", err);
            alert("无法连接到后端服务器，请检查 Java 是否启动");
        }
    });
</script>
</body>
</html>
