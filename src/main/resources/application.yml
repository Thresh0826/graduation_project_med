spring:
  profiles:
    # --- 核心开关 ---
    # 本地开发时写 dev，部署到云端前改为 prod
    active: dev

  # 数据库配置（本地和云端如果共用一个数据库则写在这里）
  datasource:
    url: jdbc:mysql://localhost:3306/med_viewer_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

mybatis:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080