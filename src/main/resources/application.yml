server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/med_viewer_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8
    username: root
    password: 123456 # 改回你的密码
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# 影像存储路径配置
file:
  # 建议还是先用绝对路径确保成功，或者确保这个文件夹已手动创建
  upload-dir: /root/graduation/med_data

# 修正 MyBatis 的配置键（从 mybatis-plus 改为 mybatis）
mybatis:
  configuration:
    map-underscore-to-camel-case: true