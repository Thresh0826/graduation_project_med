spring:
  profiles:
    # --- 核心开关 ---
    # 本地开发时写 dev，部署到云端前改为 prod
    active: dev

  # 数据库配置（优先从环境变量读取，开发环境使用默认值）
  datasource:
    url: jdbc:mysql://localhost:3306/med_viewer_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

mybatis:
  configuration:
    map-underscore-to-camel-case: true

# 【修复】添加缺失的自定义配置
file:
  upload-dir: ./med_data/ # 默认存放在项目运行目录下的 med-data 文件夹

server:
  port: 8080

# 外部大模型 (阿里云通义千问 Qwen-VL) 接口配置
ai:
  qwen:
    api-key: ${AI_API_KEY:} # 从环境变量注入 DashScope API Key
    model: "qwen-vl-plus"
    endpoint: "https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation"
